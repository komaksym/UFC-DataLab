<!DOCTYPE html>
<html>
  <body>
    <section>
      <div>
        <div>
          <h2 class="b-content__title">
            <span>UFC Fight Night: Draws and No Contests</span>
          </h2>
          <div>
            <ul class="b-list__box-list">
              <li class="b-list__box-list-item">
                Date:
                January 1, 2025
              </li>
              <li class="b-list__box-list-item">
                Location:
                Las Vegas, Nevada, USA
              </li>
            </ul>
          </div>
        </div>
        <table>
          <tbody class="b-fight-details__table-body">
            <tr
              class="b-fight-details__table-row b-fight-details__table-row__hover js-fight-details-click"
              data-link="http://ufcstats.com/fight-details/decisive-fight"
            >
              <td>
                <p class="b-fight-details__table-text">
                  <a class="b-flag b-flag_style_green" href="http://ufcstats.com/fight-details/should-not-be-used">
                    <i class="b-flag__text">win</i>
                  </a>
                </p>
              </td>
            </tr>
            <tr
              class="b-fight-details__table-row b-fight-details__table-row__hover js-fight-details-click"
              data-link="http://ufcstats.com/fight-details/draw-fight"
            >
              <td>
                <p class="b-fight-details__table-text">draw</p>
                <p class="b-fight-details__table-text">draw</p>
              </td>
            </tr>
            <tr
              class="b-fight-details__table-row b-fight-details__table-row__hover js-fight-details-click"
              data-link="http://ufcstats.com/fight-details/no-contest-fight"
            >
              <td>
                <p class="b-fight-details__table-text">nc</p>
                <p class="b-fight-details__table-text">nc</p>
              </td>
            </tr>
          </tbody>
        </table>
      </div>
    </section>
  </body>
</html>
